name: Build and publish release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  validate-version:
    name: Validate release version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - name: Check out source
        uses: actions/checkout@v6

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Match tag and source versions
        id: version
        shell: bash
        env:
          TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          version="${TAG#v}"
          runtime_version="$(python -c 'import clipsoon; print(clipsoon.__version__)')"
          project_version="$(python -c 'import pathlib, tomllib; print(tomllib.loads(pathlib.Path("pyproject.toml").read_text())["project"]["version"])')"
          if [[ ! "$version" =~ ^[0-9]+\.[0-9]+\.[0-9]+([.-][0-9A-Za-z.-]+)?$ ]]; then
            echo "Invalid release tag: $TAG" >&2
            exit 1
          fi
          if [[ "$version" != "$runtime_version" || "$version" != "$project_version" ]]; then
            echo "Tag $version, runtime $runtime_version and project $project_version must match" >&2
            exit 1
          fi
          echo "version=$version" >> "$GITHUB_OUTPUT"

  build-windows-x64:
    name: Build Windows x64
    needs: validate-version
    runs-on: windows-latest
    steps:
      - name: Check out source
        uses: actions/checkout@v6

      - name: Set up Python 3.12 x64
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          architecture: x64

      - name: Install build dependencies
        shell: pwsh
        run: |
          python -m venv .venv
          .\.venv\Scripts\python.exe -m pip install --upgrade pip
          .\.venv\Scripts\python.exe -m pip install -e ".[package]"

      - name: Build Windows package
        shell: pwsh
        run: |
          if ($env:PROCESSOR_ARCHITECTURE -ne "AMD64") {
            throw "Expected an x64 runner, got $env:PROCESSOR_ARCHITECTURE"
          }
          & .\build_windows.bat
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          if (-not (Test-Path "dist\ClipSoon\ClipSoon.exe")) {
            throw "dist\ClipSoon\ClipSoon.exe was not produced"
          }

      - name: Archive Windows package
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force release-assets | Out-Null
          $archive = "release-assets\ClipSoon-$env:GITHUB_REF_NAME-windows-x64.zip"
          Compress-Archive -Path "dist\ClipSoon" -DestinationPath $archive -Force

      - name: Upload Windows package
        uses: actions/upload-artifact@v7
        with:
          name: ClipSoon-${{ github.ref_name }}-windows-x64
          path: release-assets/ClipSoon-${{ github.ref_name }}-windows-x64.zip
          if-no-files-found: error
          retention-days: 7

  build-macos-arm64:
    name: Build macOS M1
    needs: validate-version
    runs-on: macos-14
    steps:
      - name: Check out source
        uses: actions/checkout@v6

      - name: Set up Python 3.12 arm64
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          architecture: arm64

      - name: Verify Apple Silicon runner
        shell: bash
        run: |
          set -euo pipefail
          test "$(uname -m)" = "arm64"

      - name: Install build dependencies
        shell: bash
        run: |
          set -euo pipefail
          python -m venv .venv
          .venv/bin/python -m pip install --upgrade pip
          .venv/bin/python -m pip install -e '.[package]'

      - name: Build and verify macOS package
        shell: bash
        env:
          CLIPSOON_VERSION: ${{ needs.validate-version.outputs.version }}
        run: |
          set -euo pipefail
          ./build_macos.command
          test -d dist/ClipSoon.app
          file dist/ClipSoon.app/Contents/MacOS/ClipSoon | tee /tmp/clipsoon-architecture.txt
          grep -q "arm64" /tmp/clipsoon-architecture.txt

      - name: Archive macOS package
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p release-assets
          ditto -c -k --sequesterRsrc --keepParent \
            dist/ClipSoon.app \
            "release-assets/ClipSoon-${GITHUB_REF_NAME}-macOS-arm64.zip"

      - name: Upload macOS package
        uses: actions/upload-artifact@v7
        with:
          name: ClipSoon-${{ github.ref_name }}-macOS-arm64
          path: release-assets/ClipSoon-${{ github.ref_name }}-macOS-arm64.zip
          if-no-files-found: error
          retention-days: 7

  publish-release:
    name: Publish GitHub Release
    needs:
      - build-windows-x64
      - build-macos-arm64
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download packages
        uses: actions/download-artifact@v7
        with:
          pattern: ClipSoon-${{ github.ref_name }}-*
          path: release-assets
          merge-multiple: true

      - name: Generate checksums
        shell: bash
        run: |
          set -euo pipefail
          cd release-assets
          sha256sum ClipSoon-*.zip > SHA256SUMS.txt
          cat SHA256SUMS.txt

      - name: Create or update release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          if gh release view "$TAG" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            gh release upload "$TAG" release-assets/* \
              --repo "$GITHUB_REPOSITORY" \
              --clobber
          else
            release_flags=()
            if [[ "$TAG" == *-* ]]; then
              release_flags+=(--prerelease)
            fi
            gh release create "$TAG" release-assets/* \
              --repo "$GITHUB_REPOSITORY" \
              --verify-tag \
              --generate-notes \
              --title "ClipSoon $TAG" \
              "${release_flags[@]}"
          fi
